<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedra, Papel e Tesoura</title>
	<link rel="stylesheet" href="style.css">
    </head>
<body>
    <main class="jogo-container">
        <h1>Stone, Rock and Scissors</h1>
		<h2>Make Your Move.</h2>
        <div class="escolhas">
    		<button id="pedra" class="btn-escolha">
        		<span class="icone">✊🏽</span>
        		<span class="nome-escolha">Pedra</span>
    		</button>

    		<button id="papel" class="btn-escolha">
        		<span class="icone">✋🏽</span>
        		<span class="nome-escolha">Papel</span>
    		</button>

    		<button id="tesoura" class="btn-escolha">
        		<span class="icone">✌🏽</span>
        		<span class="nome-escolha">Tesoura</span>
    		</button>
		</div>

        <div class="placar">
    		<span class="icone">👨🏽Jogador: <strong id="pontos-jogador">0</strong></span>
    		<span clas="icone">⚔️</span>
   			<span class="icone">PC💻: <strong id="pontos-computador">0</strong></span>
		</div>
		<div id="status-jogo" style="margin-top: 20px;">Escolha uma opção para começar!</div>
		<small style="font-size: 10px; color: #bbb; font-weight: normal;">Desenvolvido por Manuel Muzembela | TOP</small></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
