<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedra, Papel e Tesoura</title>
    </head>
<body>
    <main class="jogo-container">
        <h1>Stone, Rock and Scissors</h1>
        
        <div class="escolhas">
            <button id="pedra">🪨 Pedra</button>
            <button id="papel">📄 Papel</button>
            <button id="tesoura">✂️ Tesoura</button>
        </div>

        <div class="placar">
    		<span>Jogador: <strong id="pontos-jogador">0</strong></span>
    		<span> VS </span>
   			<span>PC: <strong id="pontos-computador">0</strong></span>
		</div>
		<div id="status-jogo" style="margin-top: 20px;">Escolha uma opção para começar!</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
